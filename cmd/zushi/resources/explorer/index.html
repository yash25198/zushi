<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>zushi explorer</title>
    <style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff; --neutral: #9ea7b3; --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    --copied: #3fb950;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 0; margin-bottom: 24px; }
  header .container { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .chain-badge { background: var(--green); color: #000; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-label { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: var(--mono); }
  .stat-value.green { color: var(--green); }

  .search-bar { margin-bottom: 24px; display: flex; gap: 8px; }
  .search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 14px; font-family: var(--mono); outline: none; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar button { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; cursor: pointer; }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .count { background: var(--border); padding: 1px 8px; border-radius: 10px; font-size: 12px; color: var(--dim); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .card-body { padding: 12px 16px; }

  .block-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 16px; }
  .block-row:last-child { border-bottom: none; }
  .block-height { background: var(--accent); color: #000; padding: 2px 10px; border-radius: 6px; font-family: var(--mono); font-weight: 700; font-size: 13px; min-width: 70px; text-align: center; }
  .block-hash { font-family: var(--mono); font-size: 13px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .block-txcount { color: var(--dim); font-size: 13px; white-space: nowrap; }
  .block-time { color: var(--dim); font-size: 12px; white-space: nowrap; }

  .detail-grid { display: grid; grid-template-columns: 160px 1fr; gap: 6px 16px; align-items: start; }
  .detail-key { color: var(--dim); font-size: 13px; padding-top: 2px; }
  .detail-val { font-family: var(--mono); font-size: 13px; word-break: break-all; }

  .tx-row { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .tx-row:last-child { border-bottom: none; }
  .tx-hash { font-family: var(--mono); font-size: 13px; }
  .tx-vout { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tx-pill { background: var(--bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 12px; }
  .tx-pill.amount { color: var(--green); }
  .tx-pill.shielded { color: var(--purple); border-color: var(--purple); }

  /* Copyable values */
  .copyable { position: relative; display: inline-flex; align-items: center; gap: 6px; max-width: 100%; cursor: pointer; }
  .copyable:hover { color: var(--accent); }
  .copyable:hover .copy-icon { opacity: 1; }
  .copy-icon { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; width: 14px; height: 14px; color: var(--dim); }
  .copyable:hover .copy-icon { color: var(--accent); }
  .copyable .full-val { word-break: break-all; }
  .copy-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .copy-toast.show { opacity: 1; }

  #detail-view { display: none; }
  .back-btn { color: var(--dim); cursor: pointer; font-size: 13px; margin-bottom: 16px; display: inline-block; }
  .back-btn:hover { color: var(--text); }

  .page-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: var(--mono); }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; border-color: var(--border); color: var(--dim); }
  .page-info { color: var(--dim); font-size: 13px; font-family: var(--mono); }

  .empty { text-align: center; padding: 40px; color: var(--dim); }
  .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Input/output rows in tx detail */
  .io-row { display: flex; gap: 8px; align-items: flex-start; margin: 4px 0; padding: 6px 8px; border-radius: 6px; background: var(--bg); }
  .io-row:hover { border-color: var(--border); }
  .io-index { color: var(--dim); font-family: var(--mono); font-size: 12px; min-width: 24px; padding-top: 2px; }
  .io-details { flex: 1; min-width: 0; }
  .io-addr { font-family: var(--mono); font-size: 13px; word-break: break-all; }
  .io-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
</style>
  </head>
  <body>

    <div class="copy-toast" id="copy-toast">Copied!</div>

    <header>
      <div class="container">
        <div class="logo" style="cursor:pointer" onclick="navStack.length=0;showMain()"><span>zu</span>shi explorer</div>
        <div class="chain-badge">regtest</div>
      </div>
    </header>

    <div class="container">
      <div id="main-view">
        <div class="stats" id="stats">
          <div class="stat"><div class="stat-label">Block Height</div><div
              class="stat-value" id="s-height">--</div></div>
          <div class="stat"><div class="stat-label">Chain</div><div
              class="stat-value" id="s-chain">--</div></div>
          <div class="stat"><div class="stat-label">Supply (ZEC)</div><div
              class="stat-value green" id="s-supply">--</div></div>
          <div class="stat"><div class="stat-label">Difficulty</div><div
              class="stat-value" id="s-diff">--</div></div>
        </div>

        <div class="search-bar">
          <input type="text" id="search-input"
            placeholder="Search by block height, block hash, txid, or address...">
          <button onclick="doSearch()">Search</button>
        </div>

        <div class="section-title">Latest Blocks <span class="count"
            id="block-count"></span></div>
        <div class="card" id="blocks-list"><div class="empty"><div
              class="loader"></div></div></div>
        <div id="blocks-pagination" style="display:none;margin-top:12px;display:flex;justify-content:center;gap:12px;align-items:center"></div>
      </div>

      <div id="detail-view">
        <span class="back-btn" onclick="goBack()">&larr; Back</span>
        <div id="detail-content"></div>
      </div>
    </div>

    <script>
const $ = s => document.querySelector(s);

// Navigation history stack
const navStack = [];
function pushNav(type, id) {
  navStack.push({ type, id });
}
function goBack() {
  navStack.pop(); // remove current
  const prev = navStack.pop(); // get previous
  if (!prev) { showMain(); return; }
  if (prev.type === 'block') showBlock(prev.id);
  else if (prev.type === 'tx') showTx(prev.id);
  else if (prev.type === 'address') showAddress(prev.id);
  else if (prev.type === 'search') searchNullifierOrCommitment(prev.id);
  else showMain();
}

const copyIconSvg = `<svg class="copy-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>`;

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = $('#copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  });
}

function copyEl(val) {
  return `<span class="copyable" onclick="event.stopPropagation();copyText('${val}')" title="Click to copy: ${val}"><span class="full-val">${val}</span>${copyIconSvg}</span>`;
}

function copyLink(val, onclick) {
  return `<span class="copyable"><a href="#" onclick="event.preventDefault();${onclick}" style="word-break:break-all">${val}</a><span onclick="event.stopPropagation();event.preventDefault();copyText('${val}')" style="display:inline-flex">${copyIconSvg}</span></span>`;
}

async function api(path) {
  const r = await fetch(path);
  const data = await r.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

async function loadInfo() {
  try {
    const info = await api('/api/info');
    $('#s-height').textContent = info.blocks;
    $('#s-chain').textContent = info.chain;
    $('#s-supply').textContent = info.chainSupply ? parseFloat(info.chainSupply.chainValue).toFixed(2) : '--';
    $('#s-diff').textContent = info.difficulty;
  } catch(e) { console.error(e); }
}

const PAGE_SIZE = 20;
let currentPage = 0;

async function loadBlocks(page) {
  if (page !== undefined) currentPage = page;
  const offset = currentPage * PAGE_SIZE;
  try {
    const data = await api(`/api/blocks?offset=${offset}&limit=${PAGE_SIZE}`);
    const blocks = data.blocks || [];
    const total = data.total || 0;
    const totalPages = Math.ceil(total / PAGE_SIZE);

    $('#block-count').textContent = total;
    const el = $('#blocks-list');
    if (!blocks.length) { el.innerHTML = '<div class="empty">No blocks found</div>'; renderPagination(0,0); return; }
    el.innerHTML = blocks.map(b => `
      <div class="block-row" style="cursor:pointer" onclick="showBlock('${b.hash}')">
        <span class="block-height">${b.height}</span>
        <span class="block-hash">${b.hash}</span>
        <span class="block-txcount">${b.tx.length} tx</span>
        <span class="block-time">${new Date(b.time * 1000).toLocaleTimeString()}</span>
      </div>
    `).join('');
    renderPagination(totalPages, total);
  } catch(e) { console.error(e); }
}

function renderPagination(totalPages, total) {
  const pg = $('#blocks-pagination');
  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';
  const first = currentPage * PAGE_SIZE + 1;
  const last = Math.min((currentPage + 1) * PAGE_SIZE, total);
  pg.innerHTML = `
    <button class="page-btn" onclick="loadBlocks(0)" ${currentPage === 0 ? 'disabled' : ''}>&laquo;</button>
    <button class="page-btn" onclick="loadBlocks(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>&lsaquo; Prev</button>
    <span class="page-info">${first}-${last} of ${total}</span>
    <button class="page-btn" onclick="loadBlocks(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next &rsaquo;</button>
    <button class="page-btn" onclick="loadBlocks(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>&raquo;</button>
  `;
}

async function showBlock(hashOrHeight, fromSearch) {
  pushNav('block', hashOrHeight);
  $('#detail-view').style.display = 'block';
  $('#main-view').style.display = 'none';
  $('#detail-content').innerHTML = '<div class="empty"><div class="loader"></div></div>';
  try {
    const b = await api('/api/block/' + hashOrHeight);
    let txHtml = b.tx.map(tx => {
      const vouts = (tx.vout || []).map(o => {
        if (o.value > 0) {
          const addr = o.scriptPubKey && o.scriptPubKey.addresses ? o.scriptPubKey.addresses[0] : '';
          return `<span class="tx-pill amount">${o.value} ZEC</span>${addr ? `<span class="tx-pill copyable" onclick="event.stopPropagation();copyText('${addr}')" title="${addr}">${addr}</span>` : ''}`;
        }
        return '';
      }).join('');
      const isCoinbase = tx.vin && tx.vin.length > 0 && tx.vin[0].coinbase;
      const sSpends = tx.vShieldedSpend ? tx.vShieldedSpend.length : 0;
      const sOutputs = tx.vShieldedOutput ? tx.vShieldedOutput.length : 0;
      const oActions = tx.orchard && tx.orchard.actions ? tx.orchard.actions.length : 0;
      const hasShielded = sSpends > 0 || sOutputs > 0 || oActions > 0;
      const hasTIn = !isCoinbase && tx.vin && tx.vin.some(v => v.txid);
      const hasTOut = tx.vout && tx.vout.some(o => o.value > 0);

      // Classify transaction type
      let typeBadge = '';
      if (isCoinbase) {
        typeBadge = '<span class="tx-pill" style="color:var(--yellow);border-color:var(--yellow)">coinbase</span>';
      } else if (!hasShielded && hasTIn && hasTOut) {
        typeBadge = '<span class="tx-pill" style="color:var(--neutral);border-color:var(--neutral)">transparent</span>';
      } else if (hasTIn && !sSpends && sOutputs > 0) {
        typeBadge = '<span class="tx-pill shielded">shielding</span>';
      } else if (sSpends > 0 && hasTOut && !sOutputs) {
        typeBadge = '<span class="tx-pill" style="color:var(--green);border-color:var(--green)">unshielding</span>';
      } else if (sSpends > 0 && hasTOut) {
        typeBadge = '<span class="tx-pill" style="color:var(--green);border-color:var(--green)">unshielding</span>';
      } else if (sSpends > 0 && sOutputs > 0 && !hasTOut) {
        typeBadge = '<span class="tx-pill shielded">shielded</span>';
      } else if (hasShielded) {
        typeBadge = '<span class="tx-pill shielded">shielded</span>';
      }

      const tIn = isCoinbase ? 0 : (tx.vin || []).filter(v => v.txid).length;
      const tOut = (tx.vout || []).filter(o => o.value > 0).length;
      const transparentDetail = (tIn > 0 || tOut > 0) && !isCoinbase ? `<span class="tx-pill" style="color:var(--neutral);border-color:var(--neutral)">${tIn ? 'in:'+tIn+' ' : ''}${tOut ? 'out:'+tOut : ''}</span>` : '';
      const shieldDetail = hasShielded ? `<span class="tx-pill shielded">${sSpends ? 'in:'+sSpends+' ' : ''}${sOutputs ? 'out:'+sOutputs : ''}${oActions ? ' orchard:'+oActions : ''}</span>` : '';

      return `<div class="tx-row">
        <div class="tx-hash">${copyLink(tx.txid, "showTx('"+tx.txid+"')")}</div>
        <div class="tx-vout">${typeBadge}${transparentDetail}${shieldDetail}${vouts}</div>
      </div>`;
    }).join('');

    $('#detail-content').innerHTML = `
      <div class="section-title">Block #${b.height}</div>
      <div class="card"><div class="card-body">
        <div class="detail-grid">
          <span class="detail-key">Hash</span><span class="detail-val">${copyEl(b.hash)}</span>
          <span class="detail-key">Height</span><span class="detail-val">${b.height}</span>
          <span class="detail-key">Time</span><span class="detail-val">${new Date(b.time * 1000).toLocaleString()}</span>
          <span class="detail-key">Transactions</span><span class="detail-val">${b.tx.length}</span>
          <span class="detail-key">Size</span><span class="detail-val">${b.size} bytes</span>
          <span class="detail-key">Difficulty</span><span class="detail-val">${b.difficulty}</span>
          <span class="detail-key">Merkle Root</span><span class="detail-val">${copyEl(b.merkleroot)}</span>
          ${b.previousblockhash ? `<span class="detail-key">Previous Block</span><span class="detail-val">${copyLink(b.previousblockhash, "showBlock('"+b.previousblockhash+"')")}</span>` : ''}
          ${b.nextblockhash ? `<span class="detail-key">Next Block</span><span class="detail-val">${copyLink(b.nextblockhash, "showBlock('"+b.nextblockhash+"')")}</span>` : ''}
        </div>
      </div></div>
      <div class="section-title">Transactions <span class="count">${b.tx.length}</span></div>
      <div class="card">${txHtml}</div>
    `;
  } catch(e) {
    if (fromSearch) {
      navStack.pop();
      throw e;
    }
    $('#detail-content').innerHTML = `<div class="empty">Block not found: ${e.message}</div>`;
  }
}

async function showTx(txid, fromSearch) {
  pushNav('tx', txid);
  $('#detail-view').style.display = 'block';
  $('#main-view').style.display = 'none';
  $('#detail-content').innerHTML = '<div class="empty"><div class="loader"></div></div>';
  try {
    const tx = await api('/api/tx/' + txid);

    // Resolve block height
    let blockHeight = '';
    if (tx.blockhash) {
      try {
        const blk = await api('/api/block/' + tx.blockhash);
        blockHeight = blk.height;
      } catch(e) {}
    }

    const vins = (tx.vin || []).map((v, i) => {
      if (v.coinbase) {
        return `<div class="io-row">
          <span class="io-index">#${i}</span>
          <div class="io-details">
            <div class="io-addr">${copyEl(v.coinbase)}</div>
            <div class="io-meta"><span class="tx-pill">coinbase</span></div>
          </div>
        </div>`;
      }
      return `<div class="io-row">
        <span class="io-index">#${i}</span>
        <div class="io-details">
          <div class="io-addr">${copyLink(v.txid, "showTx('"+v.txid+"')")}</div>
          <div class="io-meta">
            <span class="tx-pill">vout: ${v.vout}</span>
            ${v.scriptSig && v.scriptSig.asm ? `<span class="tx-pill" style="color:var(--dim)">scriptSig</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');

    const vouts = (tx.vout || []).map((o, i) => {
      const addr = o.scriptPubKey && o.scriptPubKey.addresses ? o.scriptPubKey.addresses[0] : '';
      return `<div class="io-row">
        <span class="io-index">#${i}</span>
        <div class="io-details">
          ${addr ? `<div class="io-addr">${copyLink(addr, "showAddress('"+addr+"')")}</div>` : `<div class="io-addr" style="color:var(--dim)">no address (${o.scriptPubKey.type})</div>`}
          <div class="io-meta">
            <span class="tx-pill amount">${o.value} ZEC</span>
            <span class="tx-pill" style="color:var(--dim)">${o.scriptPubKey.type}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    const shieldedSpends = tx.vShieldedSpend ? tx.vShieldedSpend.length : 0;
    const shieldedOutputs = tx.vShieldedOutput ? tx.vShieldedOutput.length : 0;
    const orchardActions = tx.orchard && tx.orchard.actions ? tx.orchard.actions.length : 0;

    let shieldedHtml = '';
    if (shieldedSpends > 0 || shieldedOutputs > 0 || orchardActions > 0) {
      let rows = '';
      if (shieldedSpends > 0) {
        (tx.vShieldedSpend || []).forEach((s, i) => {
          rows += `<div class="io-row">
            <span class="io-index">#${i}</span>
            <div class="io-details">
              <div class="io-addr" style="color:var(--purple)">Sapling Spend</div>
              <div class="io-meta">
                <span class="tx-pill shielded">nullifier</span>
                <span class="tx-pill" style="font-size:11px">${copyEl(s.nullifier)}</span>
              </div>
            </div>
          </div>`;
        });
      }
      if (shieldedOutputs > 0) {
        (tx.vShieldedOutput || []).forEach((s, i) => {
          rows += `<div class="io-row">
            <span class="io-index">#${i}</span>
            <div class="io-details">
              <div class="io-addr" style="color:var(--purple)">Sapling Output</div>
              <div class="io-meta">
                <span class="tx-pill shielded">commitment</span>
                <span class="tx-pill" style="font-size:11px">${copyEl(s.cmu)}</span>
              </div>
            </div>
          </div>`;
        });
      }
      if (orchardActions > 0) {
        (tx.orchard.actions || []).forEach((a, i) => {
          rows += `<div class="io-row">
            <span class="io-index">#${i}</span>
            <div class="io-details">
              <div class="io-addr" style="color:var(--purple)">Orchard Action</div>
              <div class="io-meta">
                <span class="tx-pill shielded">nullifier</span>
                <span class="tx-pill" style="font-size:11px">${copyEl(a.nullifier)}</span>
              </div>
            </div>
          </div>`;
        });
      }
      shieldedHtml = `
        <div class="section-title">Shielded <span class="count" style="background:var(--purple);color:#000">${shieldedSpends + shieldedOutputs + orchardActions}</span></div>
        <div class="card"><div class="card-body">${rows}</div></div>`;
    }

    $('#detail-content').innerHTML = `
      <div class="section-title">Transaction</div>
      <div class="card"><div class="card-body">
        <div class="detail-grid">
          <span class="detail-key">TXID</span><span class="detail-val">${copyEl(tx.txid)}</span>
          <span class="detail-key">Block</span><span class="detail-val"><a href="#" onclick="event.preventDefault();showBlock('${tx.blockhash}')" style="color:var(--accent);font-weight:700">#${blockHeight}</a> <span style="color:var(--dim);margin-left:4px">${copyEl(tx.blockhash)}</span></span>
          <span class="detail-key">Confirmations</span><span class="detail-val">${tx.confirmations || 0}</span>
          <span class="detail-key">Size</span><span class="detail-val">${tx.size} bytes</span>
          <span class="detail-key">Version</span><span class="detail-val">${tx.version}</span>
          ${tx.valueBalance !== undefined && tx.valueBalance !== 0 ? `<span class="detail-key">Value Balance</span><span class="detail-val" style="color:var(--purple)">${tx.valueBalance} ZEC</span>` : ''}
        </div>
      </div></div>
      <div class="section-title">Transparent Inputs <span class="count">${(tx.vin||[]).length}</span></div>
      <div class="card"><div class="card-body">${vins || '<div style="color:var(--dim);padding:8px">None (shielded-only transaction)</div>'}</div></div>
      <div class="section-title">Transparent Outputs <span class="count">${(tx.vout||[]).length}</span></div>
      <div class="card"><div class="card-body">${vouts || '<div style="color:var(--dim);padding:8px">None (shielded-only transaction)</div>'}</div></div>
      ${shieldedHtml}
    `;
  } catch(e) {
    // If called from search chain, undo nav and re-throw so next handler runs
    if (fromSearch) {
      navStack.pop();
      throw e;
    }
    $('#detail-content').innerHTML = `<div class="empty">Transaction not found: ${e.message}</div>`;
  }
}

async function showAddress(addr) {
  pushNav('address', addr);
  $('#detail-view').style.display = 'block';
  $('#main-view').style.display = 'none';
  $('#detail-content').innerHTML = '<div class="empty"><div class="loader"></div></div>';
  try {
    const info = await api('/api/address/' + addr);

    const utxos = info.utxos || [];
    const utxoTotal = utxos.reduce((s, u) => s + u.amount, 0);
    let utxoHtml = '';
    if (utxos.length > 0) {
      const rows = utxos.map((u, i) => {
        const conf = u.confirmations || 0;
        const mature = u.generated ? (conf >= 100 ? 'mature' : 'immature') : '';
        const matureBadge = mature === 'immature'
          ? '<span class="tx-pill" style="color:var(--yellow);border-color:var(--yellow)">immature</span>'
          : mature === 'mature'
            ? '<span class="tx-pill" style="color:var(--green);border-color:var(--green)">mature</span>'
            : '';
        const coinbaseBadge = u.generated ? '<span class="tx-pill" style="color:var(--yellow);border-color:var(--yellow)">coinbase</span>' : '';
        return `<div class="io-row">
          <span class="io-index">#${i}</span>
          <div class="io-details">
            <div class="io-addr">${copyLink(u.txid, "showTx('"+u.txid+"')")}</div>
            <div class="io-meta">
              <span class="tx-pill amount">${u.amount} ZEC</span>
              <span class="tx-pill" style="color:var(--dim)">vout:${u.vout}</span>
              <span class="tx-pill" style="color:var(--dim)">${conf} confs</span>
              ${coinbaseBadge}${matureBadge}
              ${u.spendable ? '<span class="tx-pill" style="color:var(--green);border-color:var(--green)">spendable</span>' : '<span class="tx-pill" style="color:var(--red);border-color:var(--red)">locked</span>'}
            </div>
          </div>
        </div>`;
      }).join('');
      utxoHtml = `
        <div class="section-title">UTXOs <span class="count">${utxos.length}</span></div>
        <div class="card"><div class="card-body">${rows}</div></div>`;
    } else {
      utxoHtml = `
        <div class="section-title">UTXOs <span class="count">0</span></div>
        <div class="card"><div class="card-body"><div style="color:var(--dim);padding:8px">No unspent outputs for this address</div></div></div>`;
    }

    $('#detail-content').innerHTML = `
      <div class="section-title">Address</div>
      <div class="card"><div class="card-body">
        <div class="detail-grid">
          <span class="detail-key">Address</span><span class="detail-val">${copyEl(info.address)}</span>
          <span class="detail-key">Balance</span><span class="detail-val" style="color:var(--green)">${info.balance} ZEC</span>
          ${info.totalReceived !== undefined ? `<span class="detail-key">Total Received</span><span class="detail-val">${info.totalReceived} ZEC</span>` : ''}
          ${utxos.length > 0 ? `<span class="detail-key">UTXO Total</span><span class="detail-val" style="color:var(--green)">${utxoTotal} ZEC</span>` : ''}
          ${utxos.length > 0 ? `<span class="detail-key">UTXOs</span><span class="detail-val">${utxos.length}</span>` : ''}
        </div>
      </div></div>
      ${utxoHtml}
    `;
  } catch(e) {
    $('#detail-content').innerHTML = `<div class="empty">Address not found: ${e.message}</div>`;
  }
}

async function searchNullifierOrCommitment(q) {
  const results = await api('/api/search/' + q);
  if (!results || results.length === 0) throw new Error('not found');
  const r = results[0];
  pushNav('search', q);
  $('#detail-view').style.display = 'block';
  $('#main-view').style.display = 'none';
  $('#detail-content').innerHTML = `
    <div class="section-title">Search Result</div>
    <div class="card"><div class="card-body">
      <div class="detail-grid">
        <span class="detail-key">Query</span><span class="detail-val">${copyEl(q)}</span>
        <span class="detail-key">Type</span><span class="detail-val"><span class="tx-pill shielded">${r.type.replace('_',' ')}</span></span>
        <span class="detail-key">Found in TX</span><span class="detail-val">${copyLink(r.txid, "showTxReplace('"+r.txid+"')")}</span>
        <span class="detail-key">Block</span><span class="detail-val"><a href="#" onclick="event.preventDefault();showBlock(${r.block})" style="color:var(--accent);font-weight:700">#${r.block}</a></span>
        <span class="detail-key">Index</span><span class="detail-val">#${r.index}</span>
      </div>
    </div></div>
    <div style="margin-top:12px">
      <button class="page-btn" onclick="showTxReplace('${r.txid}')">View Full Transaction</button>
    </div>
  `;
}

// Replace current nav entry (search result) with the tx view instead of stacking
function showTxReplace(txid) {
  navStack.pop(); // remove the search result entry
  showTx(txid);   // pushes tx entry
}

function doSearch() {
  const q = $('#search-input').value.trim();
  if (!q) return;
  if (q.length === 64) {
    // Could be txid, block hash, or nullifier/commitment
    showTx(q, true).catch(() => showBlock(q, true).catch(() => searchNullifierOrCommitment(q).catch(() => {
      showMain();
      alert('Nothing found for: ' + q);
    })));
  } else if (/^\d+$/.test(q)) {
    showBlock(q);
  } else if (q.startsWith('tm') || q.startsWith('t1') || q.startsWith('zs') || q.startsWith('zregtest')) {
    showAddress(q);
  } else {
    showTx(q, true).catch(() => showBlock(q, true).catch(() => showAddress(q).catch(() => searchNullifierOrCommitment(q).catch(() => {
      showMain();
      alert('Nothing found for: ' + q);
    }))));
  }
}

$('#search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function showMain() {
  $('#detail-view').style.display = 'none';
  $('#main-view').style.display = 'block';
}

loadInfo();
loadBlocks(0);
setInterval(() => { loadInfo(); if (currentPage === 0) loadBlocks(); }, 5000);
</script>
  </body>
</html>
